name: CI - Test & Build

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend Tests & Build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Run tests
        run: cd frontend && npm test -- --watchAll=false

      - name: Build
        run: cd frontend && npm run build

  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: bumpa_test
          MYSQL_PASSWORD: password
          MYSQL_USER: bumpa
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 3306:3306

    strategy:
      matrix:
        php-version: ['8.1']

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: json, pdo, pdo_mysql, mbstring, xml
          tools: composer:v2

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache composer dependencies
        uses: actions/cache@v3
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: cd backend && composer install --no-interaction --prefer-dist

      - name: Setup environment
        run: |
          cd backend
          cp .env.example .env.testing
          echo "DB_HOST=127.0.0.1" >> .env.testing
          echo "DB_PORT=3306" >> .env.testing
          echo "DB_DATABASE=bumpa_test" >> .env.testing
          echo "DB_USERNAME=bumpa" >> .env.testing
          echo "DB_PASSWORD=password" >> .env.testing
          echo "APP_KEY=base64:$(openssl rand -base64 32)" >> .env.testing

      - name: Generate application key
        run: cd backend && php artisan key:generate --env=testing

      - name: Run migrations
        run: cd backend && php artisan migrate --env=testing --database=mysql

      - name: Run tests
        run: cd backend && vendor/bin/phpunit

  status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    if: always()

    steps:
      - name: Check job status
        run: |
          if [ "${{ needs.frontend.result }}" = "failure" ] || [ "${{ needs.backend.result }}" = "failure" ]; then
            echo "❌ CI Failed - Tests did not pass"
            exit 1
          else
            echo "✅ CI Passed - All tests passed!"
            exit 0
          fi